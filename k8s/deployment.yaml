apiVersion: apps/v1
kind: Deployment
metadata:
  name: gas-price-monitor
  labels:
    app: gas-price-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gas-price-monitor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: gas-price-monitor
    spec:
      containers:
        - name: app
          image: ghcr.io/nachtschatt3n/gas-price-monitor:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CACHE_DIR
              value: /cache
            - name: DATA_DIR
              value: /data
            - name: TANKERKOENIG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gas-price-monitor
                  key: api-key
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/config
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
      volumes:
        - name: cache
          emptyDir: {}
        - name: data
          emptyDir: {}
