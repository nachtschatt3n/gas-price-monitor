<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gas Price Monitor</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --border: #2a2f3a;
      --text: #e8eaed;
      --muted: #8a92a3;
      --accent: #4ade80;
      --warn: #f59e0b;
      --err: #ef4444;
      --closed: #5b6170;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex;
      align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .status { font-size: 12px; color: var(--muted); }
    .status .ok { color: var(--accent); }
    .status .err { color: var(--err); }
    main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
    .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 20px; align-items: end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    input, select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 6px; font: inherit; min-height: 44px; }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    input:focus-visible, select:focus-visible, button:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px; }
    button.primary:focus-visible { outline-color: var(--text); }
    th:focus-visible { outline-offset: -2px; }
    button { background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font: inherit; min-height: 44px; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #0a0d11; border-color: var(--accent); font-weight: 600; }
    button.primary:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .actions { display: flex; gap: 8px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { background: var(--panel-2); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted); cursor: pointer; user-select: none; white-space: nowrap; }
    th:hover { color: var(--text); }
    th .arrow { opacity: 0.5; margin-left: 4px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr.closed { opacity: 0.45; }
    .price { font-variant-numeric: tabular-nums; font-weight: 600; }
    .price.cheap { color: var(--accent); }
    .price.na { color: var(--muted); font-weight: 400; }
    .dist { color: var(--muted); font-variant-numeric: tabular-nums; }
    .field-q { position: relative; grid-column: span 2; min-width: 0; }
    .q-results {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
      max-height: 280px; overflow-y: auto; z-index: 10;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    .q-results[hidden] { display: none; }
    .q-result {
      padding: 8px 10px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .q-result:last-child { border-bottom: none; }
    .q-result:hover, .q-result.highlight { background: var(--panel-2); color: var(--text); }
    .q-result.empty, .q-result.error {
      color: var(--muted); font-style: italic; cursor: default;
    }
    .q-result.error { color: var(--err); font-style: normal; }
    .cell-stack { display: flex; flex-direction: column; gap: 2px; }
    .spark { height: 14px; min-width: 60px; color: var(--muted); }
    .spark-svg { display: block; }
    .spark-svg.trend-down { color: var(--accent); }
    .spark-svg.trend-up { color: var(--err); }
    .spark-svg.trend-flat { color: var(--muted); }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em; }
    .badge.open { background: rgba(74, 222, 128, 0.15); color: var(--accent); }
    .badge.closed { background: rgba(91, 97, 112, 0.2); color: var(--closed); }
    .mobile-label { display: none; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    .empty, .error { padding: 40px 20px; text-align: center; color: var(--muted); }
    .error { color: var(--err); }
    .footer { margin-top: 24px; font-size: 11px; color: var(--muted); text-align: center; }
    .footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px;
      text-decoration-color: var(--border); }
    .footer a:hover { text-decoration-color: var(--accent); color: var(--text); }

    /* Mobile: collapse 6-col table into card-per-station grid */
    @media (max-width: 640px) {
      header { padding: 16px; }
      main { padding: 16px 12px; }
      .controls { padding: 12px; gap: 10px; }
      .actions { grid-column: 1 / -1; }

      table { background: transparent; border: none; border-radius: 0; overflow: visible; }
      thead { display: none; }
      tbody, tr, td { display: block; }
      tr {
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
        padding: 12px 12px 10px; margin-bottom: 10px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "name status"
          "e5 e10"
          "diesel diesel"
          "bestvalue bestvalue"
          "dist dist";
        column-gap: 12px; row-gap: 10px;
      }
      tbody tr:last-child { margin-bottom: 0; }
      tr > td { padding: 0; border: none; }
      tr > td:nth-of-type(1) { grid-area: name; }
      tr > td:nth-of-type(2) { grid-area: status; text-align: right; align-self: start; }
      tr > td:nth-of-type(3) { grid-area: e5; }
      tr > td:nth-of-type(4) { grid-area: e10; }
      tr > td:nth-of-type(5) { grid-area: diesel; }
      tr > td:nth-of-type(6) { grid-area: bestvalue; }
      tr > td:nth-of-type(7) { grid-area: dist; color: var(--muted); font-size: 11px; }

      /* Add tiny fuel labels above each price on mobile */
      tr > td:nth-of-type(3)::before { content: "E5"; }
      tr > td:nth-of-type(4)::before { content: "E10"; }
      tr > td:nth-of-type(5)::before { content: "DIESEL"; }
      tr > td:nth-of-type(3)::before,
      tr > td:nth-of-type(4)::before,
      tr > td:nth-of-type(5)::before {
        display: block; font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;
      }

      /* Show the dynamic Best Value label only on mobile */
      .mobile-label {
        display: block; font-size: 10px; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>⛽ Gas Price Monitor</h1>
    <div class="status" id="status" role="status" aria-live="polite">loading…</div>
  </header>
  <main>
    <form class="controls" id="controls">
      <div class="field field-q">
        <label for="q">Location</label>
        <input id="q" type="search" autocomplete="off" spellcheck="false"
               placeholder="Try 'Berlin Mitte' or 'Stuttgart Hauptbahnhof'"
               aria-autocomplete="list" aria-controls="q-results" aria-expanded="false" />
        <div id="q-results" class="q-results" role="listbox" hidden></div>
      </div>
      <div class="field">
        <label for="radius">Radius (km)</label>
        <input id="radius" type="number" min="1" max="25" step="1" required />
      </div>
      <div class="field">
        <label for="fuel">Fuel</label>
        <select id="fuel">
          <option value="all">All</option>
          <option value="e5">E5</option>
          <option value="e10">E10</option>
          <option value="diesel">Diesel</option>
        </select>
      </div>
      <div class="field">
        <label for="fill-volume">Fill (L)</label>
        <input id="fill-volume" type="number" min="10" max="100" step="1" placeholder="40" />
      </div>
      <div class="field">
        <label for="consumption">Consumption (L/100km)</label>
        <input id="consumption" type="number" min="1" max="30" step="0.5" placeholder="7" />
      </div>
      <div class="actions">
        <button type="button" id="locate">📍 Locate me</button>
        <button type="submit" class="primary">Refresh</button>
      </div>
    </form>

    <div id="result"></div>

    <div class="footer">
      Prices: <a href="https://creativecommons.tankerkoenig.de/" target="_blank" rel="noopener">Tankerkönig (CC BY 4.0)</a>
      · Geocoding: <a href="https://photon.komoot.io/" target="_blank" rel="noopener">komoot/Photon</a>
      using <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap (ODbL)</a>
      · Auto-refresh every 5 min · <span id="last-fetch">never</span>
    </div>
  </main>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    const STORAGE_KEY = "gas-monitor-prefs";
    const REFRESH_MS = 5 * 60 * 1000;
    const SEARCH_DEBOUNCE_MS = 300;

    const state = {
      sort: { col: "dist", dir: "asc" },
      stations: [],
      fuel: "all",
      refreshTimer: null,
      refreshInflight: null,
      searchInflight: null,
      searchDebounce: null,
      lastSearched: null,
      location: { q: "", label: "", lat: 0, lng: 0 },
      picker: { open: false, results: [], highlight: 0, mode: "results" }, // mode: results | empty | loading | error
    };

    function loadPrefs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) ?? "{}");
      } catch {
        return {};
      }
    }
    function savePrefs(p) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
    }

    async function init() {
      const cfg = await fetch("/api/config").then((r) => r.json());
      const prefs = loadPrefs();

      // Migration: old shape was {lat, lng, radius, fuel}; new shape is {q, label, lat, lng, radius, fuel}.
      // If lat/lng present but no q, seed location from coords with a placeholder label.
      if (typeof prefs.lat === "number" && typeof prefs.lng === "number" && !prefs.q) {
        state.location = { q: "", label: "Saved coordinates", lat: prefs.lat, lng: prefs.lng };
      } else if (prefs.q && typeof prefs.lat === "number" && typeof prefs.lng === "number") {
        state.location = { q: prefs.q, label: prefs.label || prefs.q, lat: prefs.lat, lng: prefs.lng };
      } else {
        state.location = { q: "", label: "", lat: cfg.defaultLat, lng: cfg.defaultLng };
      }
      $("q").value = state.location.label || "";
      $("radius").value = prefs.radius ?? cfg.defaultRadius;
      $("fuel").value = prefs.fuel ?? "all";
      state.fuel = $("fuel").value;
      // Validate-on-read for fillVolume and consumption.
      $("fill-volume").value = clampNum(prefs.fillVolume, 10, 100, DEFAULT_FILL_VOLUME);
      $("consumption").value = clampNum(prefs.consumption, 1, 30, DEFAULT_CONSUMPTION);
      if (!cfg.hasApiKey) {
        setStatus("⚠ No API key configured on server", "err");
      }
      await refresh();
    }

    function setStatus(text, cls = "") {
      const el = $("status");
      el.textContent = text;
      el.className = "status " + cls;
    }

    // ---------- Best Value helpers ----------

    const DEFAULT_FILL_VOLUME = 40;
    const DEFAULT_CONSUMPTION = 7;

    function trackedFuel() {
      return state.fuel === "all" ? "e10" : state.fuel;
    }

    function clampNum(v, min, max, fallback) {
      const n = Number(v);
      if (!Number.isFinite(n) || n < min || n > max) return fallback;
      return n;
    }

    function getFillVolume() {
      return clampNum($("fill-volume").value, 10, 100, DEFAULT_FILL_VOLUME);
    }

    function getConsumption() {
      return clampNum($("consumption").value, 1, 30, DEFAULT_CONSUMPTION);
    }

    function effectiveCost(price, distKm, volume, consumption) {
      // net €/fill = price × volume + 2 × dist × (consumption / 100) × price
      // Returns Infinity for invalid inputs so callers can sort/highlight safely.
      if (typeof price !== "number" || !Number.isFinite(price) || price <= 0) return Infinity;
      if (typeof distKm !== "number" || !Number.isFinite(distKm) || distKm < 0) return Infinity;
      return price * volume + 2 * distKm * (consumption / 100) * price;
    }

    function bestValueOf(station, fuel, volume, consumption) {
      return effectiveCost(station[fuel], station.dist, volume, consumption);
    }

    // findMinBy walks the (already-sorted) station list and returns the FIRST
    // station with the lowest keyFn result. By iterating over the visible
    // sort order, ties resolve to the first-on-screen station deterministically.
    function findMinBy(stations, keyFn, openOnly = true) {
      let best = null;
      let bestKey = Infinity;
      for (const s of stations) {
        if (openOnly && !s.isOpen) continue;
        const k = keyFn(s);
        if (!Number.isFinite(k)) continue;
        if (k < bestKey) {
          best = s;
          bestKey = k;
        }
      }
      return best;
    }

    function fuelLabelFor(fuelKey) {
      if (fuelKey === "e5") return "E5";
      if (fuelKey === "e10") return "E10";
      if (fuelKey === "diesel") return "Diesel";
      return fuelKey;
    }

    function bestValueHeaderText() {
      const f = trackedFuel();
      const label = fuelLabelFor(f);
      return state.fuel === "all" ? `Best Value (${label})*` : `Best Value (${label})`;
    }

    function priceCell(p, cheapest, stationId, fuel) {
      if (p === false || p === 0 || p == null) {
        return '<td><span class="price na">—</span></td>';
      }
      const cls = (cheapest != null && p === cheapest) ? "price cheap" : "price";
      const sparkId = `spark-${stationId}-${fuel}`;
      return `<td><div class="cell-stack"><span class="${cls}">${p.toFixed(3)} €</span><span class="spark" id="${sparkId}"></span></div></td>`;
    }

    function renderSparkline(points) {
      if (!points || points.length < 2) return "";
      const w = 60;
      const h = 14;
      const prices = points.map((p) => p.price);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const range = max - min || 1;
      const tsMin = points[0].ts;
      const tsMax = points[points.length - 1].ts;
      const tsRange = tsMax - tsMin || 1;
      const coords = points.map((p) => {
        const x = ((p.ts - tsMin) / tsRange) * w;
        const y = h - ((p.price - min) / range) * h;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      const last = prices[prices.length - 1];
      const first = prices[0];
      const trend = last < first ? "down" : last > first ? "up" : "flat";
      return `<svg class="spark-svg trend-${trend}" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" preserveAspectRatio="none"><polyline points="${coords.join(" ")}" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    async function loadSparklines() {
      const ids = state.stations.map((s) => s.id).filter(Boolean);
      if (ids.length === 0) return;
      try {
        const params = new URLSearchParams({ stationIds: ids.join(","), days: "7" });
        const res = await fetch(`/api/history?${params}`);
        if (!res.ok) return;
        const body = await res.json();
        const data = body.stations || {};
        for (const s of state.stations) {
          const bucket = data[s.id];
          if (!bucket) continue;
          for (const fuel of ["e5", "e10", "diesel"]) {
            const el = document.getElementById(`spark-${s.id}-${fuel}`);
            if (el) el.innerHTML = renderSparkline(bucket[fuel]);
          }
        }
      } catch {
        // sparklines are best-effort
      }
    }

    function render() {
      const result = $("result");
      if (!state.stations.length) {
        result.innerHTML = '<div class="empty">No stations found. Try a larger radius.</div>';
        return;
      }

      const fuel = trackedFuel();
      const volume = getFillVolume();
      const consumption = getConsumption();
      const fuelLabel = fuelLabelFor(fuel);
      const headerText = bestValueHeaderText();
      const showAsterisk = state.fuel === "all";

      // Compute sort order first so findMinBy + ties resolve to the first-on-screen row.
      const sorted = [...state.stations].sort((a, b) => {
        const { col, dir } = state.sort;
        if (col === "bestValue") {
          const ak = bestValueOf(a, fuel, volume, consumption);
          const bk = bestValueOf(b, fuel, volume, consumption);
          return dir === "asc" ? ak - bk : bk - ak;
        }
        const av = a[col];
        const bv = b[col];
        const an = (av === false || av == null) ? Infinity : av;
        const bn = (bv === false || bv == null) ? Infinity : bv;
        if (typeof an === "string" || typeof bn === "string") {
          return dir === "asc" ? String(an).localeCompare(String(bn)) : String(bn).localeCompare(String(an));
        }
        return dir === "asc" ? an - bn : bn - an;
      });

      // Find cheapest open per fuel (raw price) using the shared minimum-finder.
      const cheapest = { e5: null, e10: null, diesel: null };
      for (const k of Object.keys(cheapest)) {
        const winner = findMinBy(
          sorted,
          (s) => (typeof s[k] === "number" && s[k] > 0 ? s[k] : Infinity),
          true,
        );
        cheapest[k] = winner ? winner[k] : null;
      }

      // Find best-value open station for the tracked fuel.
      const bestValueStation = findMinBy(
        sorted,
        (s) => bestValueOf(s, fuel, volume, consumption),
        true,
      );

      const arrow = (c) => state.sort.col === c ? (state.sort.dir === "asc" ? "↑" : "↓") : "";
      const ariaSort = (c) => state.sort.col === c ? (state.sort.dir === "asc" ? "ascending" : "descending") : "none";

      const fmtDist = (d) => (typeof d === "number" && Number.isFinite(d) ? d.toFixed(1) : "?");
      const postCode = (p) => (typeof p === "number" && p > 0 ? p : "");

      const bestValueCell = (s) => {
        const net = bestValueOf(s, fuel, volume, consumption);
        const isWinner = bestValueStation && s.id === bestValueStation.id;
        const cls = isWinner ? "price cheap" : "price";
        const labelSpan = `<span class="mobile-label">BEST VALUE (${escapeHtml(fuelLabel.toUpperCase())})${showAsterisk ? "*" : ""}</span>`;
        if (!Number.isFinite(net)) {
          return `<td>${labelSpan}<span class="price na">—</span></td>`;
        }
        return `<td>${labelSpan}<span class="${cls}">${net.toFixed(2)} €/fill</span></td>`;
      };

      const rows = sorted.map((s) => `
        <tr class="${s.isOpen ? "" : "closed"}">
          <td>
            <div><strong>${escapeHtml(s.name)}</strong></div>
            <div class="dist">${escapeHtml(s.brand || "")} · ${escapeHtml(s.street)} ${escapeHtml(s.houseNumber || "")}, ${postCode(s.postCode)} ${escapeHtml(s.place)}</div>
          </td>
          <td><span class="badge ${s.isOpen ? "open" : "closed"}">${s.isOpen ? "open" : "closed"}</span></td>
          ${priceCell(s.e5, cheapest.e5, s.id, "e5")}
          ${priceCell(s.e10, cheapest.e10, s.id, "e10")}
          ${priceCell(s.diesel, cheapest.diesel, s.id, "diesel")}
          ${bestValueCell(s)}
          <td class="dist">${fmtDist(s.dist)} km</td>
        </tr>
      `).join("");

      const bestValueHeader = showAsterisk
        ? `${escapeHtml(headerText.replace(/\*$/, ""))}<sup title="When fuel is set to All, Best Value defaults to E10.">*</sup><span class="sr-only">When fuel is set to All, Best Value defaults to E10.</span>`
        : escapeHtml(headerText);

      result.innerHTML = `
        <table>
          <thead>
            <tr>
              <th data-col="name" tabindex="0" role="button" aria-sort="${ariaSort("name")}">Station <span class="arrow">${arrow("name")}</span></th>
              <th data-col="isOpen" tabindex="0" role="button" aria-sort="${ariaSort("isOpen")}">Status <span class="arrow">${arrow("isOpen")}</span></th>
              <th data-col="e5" tabindex="0" role="button" aria-sort="${ariaSort("e5")}">E5 <span class="arrow">${arrow("e5")}</span></th>
              <th data-col="e10" tabindex="0" role="button" aria-sort="${ariaSort("e10")}">E10 <span class="arrow">${arrow("e10")}</span></th>
              <th data-col="diesel" tabindex="0" role="button" aria-sort="${ariaSort("diesel")}">Diesel <span class="arrow">${arrow("diesel")}</span></th>
              <th data-col="bestValue" tabindex="0" role="button" aria-sort="${ariaSort("bestValue")}">${bestValueHeader} <span class="arrow">${arrow("bestValue")}</span></th>
              <th data-col="dist" tabindex="0" role="button" aria-sort="${ariaSort("dist")}">Distance <span class="arrow">${arrow("dist")}</span></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      for (const th of result.querySelectorAll("th[data-col]")) {
        const toggleSort = () => {
          const col = th.dataset.col;
          if (state.sort.col === col) {
            state.sort.dir = state.sort.dir === "asc" ? "desc" : "asc";
          } else {
            state.sort.col = col;
            state.sort.dir = "asc";
          }
          render();
        };
        th.addEventListener("click", toggleSort);
        th.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            toggleSort();
          }
        });
      }

      loadSparklines();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }

    async function refresh() {
      if (!state.location.lat || !state.location.lng) {
        setStatus("pick a location to start", "");
        return;
      }
      const radius = $("radius").value;
      const fuel = $("fuel").value;
      state.fuel = fuel;

      savePrefs({
        q: state.location.q,
        label: state.location.label,
        lat: state.location.lat,
        lng: state.location.lng,
        radius,
        fuel,
        fillVolume: getFillVolume(),
        consumption: getConsumption(),
      });

      if (state.refreshInflight) state.refreshInflight.abort();
      const controller = new AbortController();
      state.refreshInflight = controller;

      setStatus("fetching…");
      const params = new URLSearchParams({
        lat: String(state.location.lat),
        lng: String(state.location.lng),
        radius,
        type: fuel,
      });
      try {
        const res = await fetch(`/api/stations?${params}`, { signal: controller.signal });
        const body = await res.json();
        if (state.refreshInflight !== controller) return;
        if (!res.ok) {
          state.stations = [];
          $("result").innerHTML = `<div class="error">Error: ${escapeHtml(body.error ?? res.status)}</div>`;
          setStatus(`error ${res.status}`, "err");
          return;
        }
        state.stations = body.stations ?? [];
        const ts = new Date(body.fetchedAt);
        $("last-fetch").textContent = `updated ${ts.toLocaleTimeString()}`;
        setStatus(`${state.stations.length} stations`, "ok");
        render();
        scheduleNext();
      } catch (err) {
        if (err.name === "AbortError") return;
        setStatus("network error", "err");
        $("result").innerHTML = `<div class="error">Network error: ${escapeHtml(err.message ?? err)}</div>`;
      } finally {
        if (state.refreshInflight === controller) state.refreshInflight = null;
      }
    }

    function scheduleNext() {
      if (state.refreshTimer) clearTimeout(state.refreshTimer);
      state.refreshTimer = setTimeout(refresh, REFRESH_MS);
    }

    // ---------- Location search ----------

    function openPicker() {
      state.picker.open = true;
      $("q-results").hidden = false;
      $("q").setAttribute("aria-expanded", "true");
    }

    function closePicker() {
      state.picker.open = false;
      $("q-results").hidden = true;
      $("q").setAttribute("aria-expanded", "false");
    }

    function renderPicker() {
      const el = $("q-results");
      const { mode, results, highlight } = state.picker;
      if (mode === "loading") {
        el.innerHTML = '<div class="q-result empty">Searching…</div>';
      } else if (mode === "empty") {
        el.innerHTML = '<div class="q-result empty">No locations found — try a different query</div>';
      } else if (mode === "error") {
        el.innerHTML = '<div class="q-result error">Location search unavailable — try again in a minute</div>';
      } else if (results.length === 0) {
        closePicker();
        return;
      } else {
        el.innerHTML = results
          .map(
            (r, i) =>
              `<div class="q-result${i === highlight ? " highlight" : ""}" role="option" data-i="${i}">${escapeHtml(r.label)}</div>`,
          )
          .join("");
        for (const node of el.querySelectorAll(".q-result")) {
          node.addEventListener("mousedown", (e) => {
            e.preventDefault(); // keep focus on input
            const i = Number(node.dataset.i);
            pick(state.picker.results[i]);
          });
        }
      }
      openPicker();
    }

    function pick(result) {
      if (!result) return;
      state.location = {
        q: $("q").value.trim().replace(/\s+/g, " ").toLowerCase(),
        label: result.label,
        lat: result.lat,
        lng: result.lng,
      };
      $("q").value = result.label;
      closePicker();
      refresh();
    }

    async function searchNow(q) {
      const canon = q.trim().replace(/\s+/g, " ");
      if (canon.length < 2) {
        closePicker();
        return;
      }
      if (state.lastSearched === canon.toLowerCase()) return;
      state.lastSearched = canon.toLowerCase();

      if (state.searchInflight) state.searchInflight.abort();
      const controller = new AbortController();
      state.searchInflight = controller;

      state.picker.mode = "loading";
      state.picker.results = [];
      state.picker.highlight = 0;
      renderPicker();

      try {
        const res = await fetch(`/api/geocode?q=${encodeURIComponent(canon)}`, { signal: controller.signal });
        if (state.searchInflight !== controller) return;
        if (!res.ok) {
          state.picker.mode = "error";
          state.picker.results = [];
          renderPicker();
          return;
        }
        const body = await res.json();
        if (state.searchInflight !== controller) return;
        const results = Array.isArray(body.results) ? body.results : [];
        if (results.length === 0) {
          state.picker.mode = "empty";
          state.picker.results = [];
        } else {
          state.picker.mode = "results";
          state.picker.results = results;
          state.picker.highlight = 0;
        }
        renderPicker();
      } catch (err) {
        if (err.name === "AbortError") return;
        state.picker.mode = "error";
        state.picker.results = [];
        renderPicker();
      } finally {
        if (state.searchInflight === controller) state.searchInflight = null;
      }
    }

    function debouncedSearch(q) {
      if (state.searchDebounce) clearTimeout(state.searchDebounce);
      state.searchDebounce = setTimeout(() => searchNow(q), SEARCH_DEBOUNCE_MS);
    }

    $("q").addEventListener("input", (e) => {
      debouncedSearch(e.target.value);
    });

    $("q").addEventListener("keydown", (e) => {
      const { picker } = state;
      if (!picker.open || picker.mode !== "results" || picker.results.length === 0) {
        if (e.key === "Enter") {
          // No picker: trigger immediate search or refresh
          e.preventDefault();
          if (state.searchDebounce) clearTimeout(state.searchDebounce);
          if ($("q").value.trim().length >= 2) {
            searchNow($("q").value);
          } else {
            refresh();
          }
        }
        return;
      }
      if (e.key === "ArrowDown") {
        e.preventDefault();
        picker.highlight = (picker.highlight + 1) % picker.results.length;
        renderPicker();
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        picker.highlight = (picker.highlight - 1 + picker.results.length) % picker.results.length;
        renderPicker();
      } else if (e.key === "Enter") {
        e.preventDefault();
        pick(picker.results[picker.highlight]);
      } else if (e.key === "Escape") {
        e.preventDefault();
        closePicker();
      }
    });

    document.addEventListener("click", (e) => {
      if (!state.picker.open) return;
      if (e.target.closest(".field-q")) return;
      closePicker();
    });

    $("controls").addEventListener("submit", (e) => {
      e.preventDefault();
      const { picker } = state;
      if (picker.open && picker.mode === "results" && picker.results.length > 0) {
        pick(picker.results[picker.highlight]);
        return;
      }
      const q = $("q").value.trim();
      if (q.length >= 2 && q !== state.location.label) {
        // User changed the input but didn't pick — fire a search.
        if (state.searchDebounce) clearTimeout(state.searchDebounce);
        searchNow(q);
        return;
      }
      refresh();
    });

    // Fuel change re-fetches because the proxy normalizes per-fuel:
    // switching the dropdown without refetching leaves the new fuel's prices as `false`.
    $("fuel").addEventListener("change", () => {
      state.fuel = $("fuel").value;
      refresh();
    });

    // Fill volume + consumption changes recompute client-side only — no upstream data needed.
    $("fill-volume").addEventListener("input", () => {
      if (state.stations.length) render();
    });
    $("consumption").addEventListener("input", () => {
      if (state.stations.length) render();
    });

    $("locate").addEventListener("click", () => {
      if (!navigator.geolocation) {
        setStatus("geolocation unavailable", "err");
        return;
      }
      setStatus("locating…");
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          state.location = {
            q: "",
            label: "Current location",
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
          };
          $("q").value = state.location.label;
          closePicker();
          refresh();
        },
        (err) => setStatus("geolocation: " + err.message, "err"),
        { enableHighAccuracy: false, timeout: 10000 },
      );
    });

    init();
  </script>
</body>
</html>
